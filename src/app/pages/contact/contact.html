<section aria-labelledby="contact-heading">
  <h1 id="contact-heading" class="page-title">Contact</h1>
  <p class="contact-intro">Feel free to reach out through any of the channels below.</p>

  <div class="contact-cards">
    @for (link of content().links; track link.href) {
      <a class="contact-card" [href]="link.href" target="_blank" rel="noopener noreferrer">
        <div class="contact-card-content">
          <span class="contact-card-label">{{ link.label }}</span>
          <span class="contact-card-url">{{ link.href }}</span>
        </div>
        <span class="contact-card-arrow" aria-hidden="true">↗</span>
      </a>
    }
    <a class="contact-card" [href]="'mailto:' + content().email">
      <div class="contact-card-content">
        <span class="contact-card-label">Email</span>
        <span class="contact-card-url">{{ content().email }}</span>
      </div>
      <span class="contact-card-arrow" aria-hidden="true">↗</span>
    </a>
  </div>
</section>
