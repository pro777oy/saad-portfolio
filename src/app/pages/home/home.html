<section class="hero" aria-labelledby="hero-title">
  <div class="hero-content">
    <p class="eyebrow">Hello, I am</p>
    <h1 id="hero-title">{{ profile().name }}</h1>
    <p class="hero-title">{{ profile().title }}</p>
    <p class="hero-intro">{{ profile().intro }}</p>
    <p class="hero-bio">{{ profile().bio }}</p>

    <div class="hero-actions" aria-label="Home quick actions">
      <a class="button-link" routerLink="/projects">View Projects</a>
      <a class="button-link button-link-secondary" routerLink="/experience">Work Experience</a>
    </div>
  </div>
</section>
